<h1 id="tableLabel">Persons</h1>

<p>This component retrives a list of persons</p>

<p *ngIf="persons.length == 0"><em>Loading Persons...</em></p>

<table *ngIf="persons.length > 0">
  <thead>
    <tr>
      <th>First Name</th>
      <th>Last Name</th>
      <th>Details</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let person of persons">
      <td>{{ person.firstName }}</td>
      <td>{{ person.lastName }}</td>
      <td><a [routerLink]="['/persons', person.personId]">Open</a></td>
    </tr>
  </tbody>
</table>

<a routerLink="/accounts">View Accounts</a>
